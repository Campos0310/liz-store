<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liz Store | Camisetas Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="shortcut icon" href="favicon.jpeg" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="bem-vindo.css">
</head>

<body>

    <section class="secao-destaque">
        <img src="banner de bem vindo.png" alt="Banner Liz Store" class="imagem-banner">

        <div class="sobreposicao"></div>

        <div id="particles-js"></div>

        <div class="conteudo-destaque">
            <h1 class="titulo-marca">BEM-VINDA À LIZ STORE</h1>
            <p class="subtitulo-marca">ONDE O BÁSICO ENCONTRA O PREMIUM</p>
            <a href="pagina-inicial.html" class="botao-comprar">COMPRAR AGORA</a>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { 
                    "value": 50, 
                    "density": { "enable": true, "value_area": 800 } 
                },
                "color": { "value": "#ffffff" },
                "opacity": { 
                    "value": 0.4, 
                    "random": true,
                    "anim": { "enable": true, "speed": 1, "opacity_min": 0.1, "sync": false }
                },
                "size": { 
                    "value": 3, 
                    "random": true,
                    "anim": { "enable": false }
                },
                "line_linked": { "enable": false }, 
                "move": { 
                    "enable": true, 
                    "speed": 0.8, 
                    "direction": "top", 
                    "random": true, 
                    "straight": false, 
                    "out_mode": "out" 
                }
            },
            "interactivity": { "detect_on": "canvas", "events": { "onhover": { "enable": false }, "onclick": { "enable": false } } }
        });
    </script>
</body>

</html>
